<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProductVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8f8f7;
            color: #1a1a18;
            min-height: 100vh;
            font-size: 14px;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 232px;
            min-height: 100vh;
            background: #fff;
            border-right: 1px solid #ebebea;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .logo {
            padding: 22px 18px 18px;
            border-bottom: 1px solid #ebebea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            background: #1a1a18;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a18;
            line-height: 1.2;
        }

        .logo-sub {
            font-size: 11px;
            color: #999;
        }

        .sidebar-section {
            padding: 14px 10px 8px;
        }

        .sidebar-label {
            font-size: 10px;
            font-weight: 600;
            color: #bbb;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 4px;
        }

        .filter-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 13px;
            font-family: inherit;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s, color 0.12s;
        }

        .filter-btn:hover {
            background: #f5f5f4;
            color: #1a1a18;
        }

        .filter-btn.active {
            background: #f0f0ef;
            color: #1a1a18;
            font-weight: 500;
        }

        .filter-btn .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .filter-btn .count {
            margin-left: auto;
            font-size: 11px;
            color: #ccc;
            font-weight: 400;
        }

        .filter-btn.active .count {
            color: #aaa;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 14px 18px;
            border-top: 1px solid #ebebea;
            font-size: 11px;
            color: #bbb;
            line-height: 1.6;
        }

        /* Main */
        .main {
            margin-left: 232px;
            flex: 1;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 5;
            background: rgba(248, 248, 247, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #ebebea;
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a18;
            flex: 1;
        }

        .topbar-title span {
            color: #aaa;
            font-weight: 400;
            margin-left: 6px;
        }

        select {
            background: #fff;
            border: 1px solid #e0e0de;
            color: #1a1a18;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            padding: 6px 10px;
            cursor: pointer;
        }

        select:focus {
            outline: 2px solid #1a1a18;
            outline-offset: 2px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1px solid #e0e0de;
            border-radius: 6px;
            background: #fff;
            color: #1a1a18;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
        }

        .btn:hover:not(:disabled) {
            background: #f5f5f4;
            border-color: #ccc;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #1a1a18;
            color: #fff;
            border-color: #1a1a18;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2d2d2b;
            border-color: #2d2d2b;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            border-bottom: 1px solid #ebebea;
            background: #fff;
        }

        .stat-cell {
            flex: 1;
            padding: 12px 24px;
            border-right: 1px solid #ebebea;
        }

        .stat-cell:last-child {
            border-right: none;
        }

        .stat-cell-label {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 2px;
        }

        .stat-cell-val {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a18;
        }

        /* Content */
        .content {
            padding: 22px 28px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .card {
            background: #fff;
            border: 1px solid #ebebea;
            border-radius: 10px;
            padding: 16px;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .card:hover {
            border-color: #d5d5d3;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-id {
            font-size: 10px;
            color: #ccc;
            font-weight: 500;
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: 0.01em;
        }

        .card-name {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a18;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-price {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a18;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .card-price sup {
            font-size: 12px;
            font-weight: 500;
            vertical-align: super;
            color: #555;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #bbb;
            padding-top: 11px;
            border-top: 1px solid #f0f0ef;
        }

        /* Badge colours — light */
        .b-electronics {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .b-clothing {
            background: #fdf2f8;
            color: #9d174d;
        }

        .b-books {
            background: #f0fdf4;
            color: #15803d;
        }

        .b-home {
            background: #fffbeb;
            color: #b45309;
        }

        .b-sports {
            background: #f0fdfa;
            color: #0f766e;
        }

        .b-toys {
            background: #fdf4ff;
            color: #7e22ce;
        }

        .b-beauty {
            background: #fff1f2;
            color: #be123c;
        }

        .b-automotive {
            background: #f8fafc;
            color: #475569;
        }

        .b-garden {
            background: #f7fee7;
            color: #3f6212;
        }

        .b-food {
            background: #fff7ed;
            color: #c2410c;
        }

        .b-default {
            background: #f5f5f4;
            color: #555;
        }

        /* Dot colours */
        .d-electronics {
            background: #3b82f6;
        }

        .d-clothing {
            background: #ec4899;
        }

        .d-books {
            background: #22c55e;
        }

        .d-home {
            background: #f59e0b;
        }

        .d-sports {
            background: #14b8a6;
        }

        .d-toys {
            background: #a855f7;
        }

        .d-beauty {
            background: #ef4444;
        }

        .d-automotive {
            background: #64748b;
        }

        .d-garden {
            background: #84cc16;
        }

        .d-food {
            background: #f97316;
        }

        .d-all {
            background: #1a1a18;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            gap: 14px;
            color: #bbb;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #e5e5e3;
            border-top-color: #1a1a18;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-box {
            background: #fff1f2;
            color: #be123c;
            border: 1px solid #fecdd3;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-info {
            font-size: 12px;
            color: #bbb;
            margin-left: auto;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e0e0de;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="layout">

        <aside class="sidebar">
            <div class="logo">
                <div class="logo-mark">P</div>
                <div>
                    <div class="logo-name">ProductVault</div>
                    <div class="logo-sub">200,000 products</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Categories</div>
                <div id="category-filters">
                    <button class="filter-btn active" data-cat="" onclick="setCategory('')">
                        <span class="dot d-all"></span>
                        All Products
                        <span class="count">200k</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-footer">
                Cursor-based pagination<br />Stable results as data changes
            </div>
        </aside>

        <div class="main">
            <div class="topbar">
                <div class="topbar-title">
                    Products
                    <span id="topbar-sub">All categories</span>
                </div>
                <select id="limit-sel" onchange="setLimit(this.value)">
                    <option value="10">10 / page</option>
                    <option value="20" selected>20 / page</option>
                    <option value="50">50 / page</option>
                    <option value="100">100 / page</option>
                </select>
            </div>

            <div class="stats-bar">
                <div class="stat-cell">
                    <div class="stat-cell-label">Page</div>
                    <div class="stat-cell-val" id="stat-page">1</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-cell-label">Showing</div>
                    <div class="stat-cell-val" id="stat-shown">—</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-cell-label">Per page</div>
                    <div class="stat-cell-val" id="stat-limit">20</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-cell-label">Category</div>
                    <div class="stat-cell-val" id="stat-cat" style="font-size:13px;padding-top:2px">All</div>
                </div>
            </div>

            <div class="content">
                <div id="error-box" class="error-box" style="display:none"></div>
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <span>Loading products…</span>
                </div>
                <div id="grid" class="grid" style="display:none"></div>
                <div class="pagination">
                    <button class="btn" id="btn-back" onclick="goBack()" disabled>← Back</button>
                    <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>Next →</button>
                    <span class="page-info" id="page-info"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        const catMeta = {
            Electronics: { badge: 'b-electronics', dot: 'd-electronics' },
            Clothing: { badge: 'b-clothing', dot: 'd-clothing' },
            Books: { badge: 'b-books', dot: 'd-books' },
            Home: { badge: 'b-home', dot: 'd-home' },
            Sports: { badge: 'b-sports', dot: 'd-sports' },
            Toys: { badge: 'b-toys', dot: 'd-toys' },
            Beauty: { badge: 'b-beauty', dot: 'd-beauty' },
            Automotive: { badge: 'b-automotive', dot: 'd-automotive' },
            Garden: { badge: 'b-garden', dot: 'd-garden' },
            Food: { badge: 'b-food', dot: 'd-food' },
        };
        function getMeta(c) { return catMeta[c] || { badge: 'b-default', dot: 'd-all' }; }

        let cursorStack = [], currentCursor = null, nextCursor = null;
        let category = '', limit = 20, page = 1;

        async function init() {
            try {
                const cats = await (await fetch(`${API}/categories`)).json();
                const wrap = document.getElementById('category-filters');
                cats.forEach(c => {
                    const m = getMeta(c);
                    const b = document.createElement('button');
                    b.className = 'filter-btn'; b.dataset.cat = c;
                    b.onclick = () => setCategory(c);
                    b.innerHTML = `<span class="dot ${m.dot}"></span>${c}<span class="count">—</span>`;
                    wrap.appendChild(b);
                });
            } catch (e) { }
            fetchProducts(null);
        }

        function setCategory(cat) {
            category = cat;
            cursorStack = []; currentCursor = null; page = 1;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
            document.getElementById('topbar-sub').textContent = cat || 'All categories';
            fetchProducts(null);
        }

        function setLimit(v) {
            limit = parseInt(v);
            cursorStack = []; currentCursor = null; page = 1;
            fetchProducts(null);
        }

        async function fetchProducts(cursor) {
            setLoading(true);
            let url = `${API}/products?limit=${limit}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;
            if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;
            try {
                const data = await (await fetch(url)).json();
                nextCursor = data.next_cursor;
                renderProducts(data.data);
                const hasNext = data.has_next, hasBack = cursorStack.length > 0;
                document.getElementById('btn-back').disabled = !hasBack;
                document.getElementById('btn-next').disabled = !hasNext;
                document.getElementById('stat-page').textContent = page;
                document.getElementById('stat-shown').textContent = data.data.length;
                document.getElementById('stat-limit').textContent = limit;
                document.getElementById('stat-cat').textContent = category || 'All';
                document.getElementById('page-info').textContent = hasNext ? `Page ${page}` : `Page ${page} · end of results`;
                setLoading(false);
            } catch (e) {
                setLoading(false);
                const b = document.getElementById('error-box');
                b.style.display = 'block';
                b.textContent = `API error: ${e.message}`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const date = new Date(p.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                const price = Number(p.price).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                const m = getMeta(p.category);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
      <div class="card-top">
        <div class="card-id">#${p.id}</div>
        <span class="badge ${m.badge}">${p.category}</span>
      </div>
      <div class="card-name" title="${p.name}">${p.name}</div>
      <div class="card-price"><sup>₹</sup>${price}</div>
      <div class="card-footer">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        ${date}
      </div>`;
                grid.appendChild(card);
            });
        }

        function goNext() {
            cursorStack.push(currentCursor); currentCursor = nextCursor; page++;
            console.log('cursor being used:', currentCursor); // add this
            fetchProducts(currentCursor); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function goBack() {
            currentCursor = cursorStack.pop(); page = Math.max(1, page - 1);
            fetchProducts(currentCursor); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function setLoading(on) {
            document.getElementById('loading').style.display = on ? 'flex' : 'none';
            document.getElementById('grid').style.display = on ? 'none' : 'grid';
            document.getElementById('error-box').style.display = 'none';
        }

        init();
    </script>
</body>

</html>
